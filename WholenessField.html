<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wholeness Field — 3D Awareness Tool · Therapy 3.0</title>
<style>
  :root{
    --navy:#1B2A4A; --navy-soft:#2C3E63; --gold:#B8972B; --gold-soft:#D4B454;
    --ink:#E8ECF4; --ink-dim:#9AA6BE; --panel:rgba(18,27,48,0.82);
    --line:rgba(184,151,43,0.28); --field:#0A1326;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:Georgia,'Times New Roman',serif;background:var(--field);color:var(--ink)}
  #stage{position:fixed;inset:0}
  canvas{display:block;touch-action:none}

  .panel{position:fixed;background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:14px;padding:16px 18px;z-index:10}

  #masthead{top:18px;left:18px;max-width:300px}
  #masthead .brand{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);display:flex;justify-content:space-between;align-items:center}
  #masthead .ver{color:var(--gold-soft);letter-spacing:1px;text-transform:none}
  #masthead h1{font-size:20px;font-weight:normal;margin:4px 0 2px;color:var(--ink)}
  #masthead p{font-size:12px;line-height:1.5;color:var(--ink-dim)}
  #masthead .build{font-size:10px;letter-spacing:0.5px;color:var(--ink-dim);opacity:0.6;margin-top:7px;font-family:monospace}

  #steps{top:18px;right:18px;width:268px;max-height:calc(100vh - 36px);overflow-y:auto}
  #steps h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .step{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid rgba(184,151,43,0.12);cursor:pointer;opacity:0.5;transition:opacity .25s}
  .step:last-child{border-bottom:none}
  .step.active{opacity:1}
  .step.done{opacity:0.75}
  .step .n{flex:none;width:23px;height:23px;border-radius:50%;border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gold-soft)}
  .step.active .n{background:var(--gold);color:var(--navy)}
  .step.done .n{background:rgba(184,151,43,0.25)}
  .step .b{flex:1}
  .step .t{font-size:13px;color:var(--ink);line-height:1.3}
  .step .d{font-size:11px;color:var(--ink-dim);line-height:1.4;margin-top:2px}

  #dock{bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;
    flex-wrap:wrap;justify-content:center;max-width:calc(100vw - 36px)}
  button{font-family:inherit;font-size:13px;color:var(--ink);background:rgba(184,151,43,0.1);
    border:1px solid var(--line);border-radius:9px;padding:9px 15px;cursor:pointer;transition:all .2s;white-space:nowrap}
  button:hover{background:rgba(184,151,43,0.22);border-color:var(--gold)}
  button.primary{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  button.primary:hover{background:var(--gold-soft)}
  button:disabled{opacity:0.35;cursor:default}


  #tools{top:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px}

  /* notes boxes */
  .note{position:absolute;z-index:8;width:190px;background:rgba(24,34,58,0.92);
    border:1px solid var(--line);border-radius:10px;padding:8px 9px 9px;
    box-shadow:0 4px 18px rgba(0,0,0,0.4)}
  .note .nh{display:flex;justify-content:space-between;align-items:center;
    cursor:grab;margin-bottom:5px;user-select:none}
  .note .nh:active{cursor:grabbing}
  .note .grip{color:var(--gold);font-size:11px;letter-spacing:1px}
  .note .nx{color:var(--ink-dim);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
  .note .nx:hover{color:var(--gold-soft)}
  .note textarea{width:100%;min-height:62px;resize:vertical;background:transparent;border:none;
    outline:none;color:var(--ink);font-family:Georgia,serif;font-size:12px;line-height:1.5;
    text-align:left}
  .note .cc{font-size:10px;color:var(--ink-dim);text-align:right;margin-top:3px}
  .note .cc.warn{color:#D4B454}

  #hint{bottom:90px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--ink-dim);
    background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:7px 16px;
    pointer-events:none;opacity:0;transition:opacity .4s;max-width:90vw;text-align:center;z-index:11}
  #hint.show{opacity:1}

  @media (max-width:980px){
    #masthead{max-width:200px;padding:11px 13px}
    #masthead h1{font-size:16px}


  }
</style>
</head>
<body>
<div id="stage"></div>

<div id="masthead" class="panel">
  <div class="brand"><span>Therapy 3.0</span><span class="ver" id="verlabel">v3.3</span></div>
  <h1>Wholeness Field</h1>
  <p>Looking from the I, opening to include — through the recursive chain of awareness.</p>
  <div class="build" id="buildlabel">build —</div>
</div>

<div id="tools" class="panel" style="padding:9px 12px">
  <button id="addnote">+ Note</button>
</div>

<div id="hint"></div>

<div id="dock" class="panel">
	<button id="begin" class="primary">Begin</button>
	<button id="undoEye" disabled>Undo Eye</button>
	<button id="reset">Reset</button>
	<button id="snap">Capture PNG</button>
</div>

      side:THREE_.DoubleSide, roughness:1, depthWrite:false}));
  scene.add(bodyMesh);
  const head = new THREE_.Mesh(new THREE_.SphereGeometry(0.85,24,18),
    new THREE_.MeshStandardMaterial({color:0x2C3E63, transparent:true, opacity:0.13,
      roughness:1, depthWrite:false}));
  head.position.y = 3.0; scene.add(head);

  partMesh = new THREE_.Mesh(new THREE_.IcosahedronGeometry(0.95, 1),
    new THREE_.MeshStandardMaterial({color:0xD85A30, emissive:0x993C1D, emissiveIntensity:0.38,
      roughness:0.6, transparent:true, opacity:0.30, depthWrite:false}));
  partMesh.position.set(0, -0.4, 0.2);
  partMesh.visible = false;
  scene.add(partMesh);

  fieldShell = new THREE_.Mesh(new THREE_.SphereGeometry(1,40,30),
    new THREE_.MeshStandardMaterial({color:0xB8972B, transparent:true, opacity:0.0,
      side:THREE_.DoubleSide, emissive:0xB8972B, emissiveIntensity:0.18, roughness:1, depthWrite:false}));
  scene.add(fieldShell);

  figure = makeFigure();
  figure.visible = false;
  scene.add(figure);

  bindEvents();
  animate();
}

function makeFigure(){
  const g = new THREE_.Group();
  const tex = new THREE_.Texture();
  const img = new Image();
  img.onload = ()=>{ tex.image=img; tex.needsUpdate=true; tex.minFilter=THREE_.LinearFilter; };
  img.src = FIGURE_PNG;
  const mat = new THREE_.SpriteMaterial({map:tex, transparent:true, opacity:0,
    depthWrite:false, depthTest:true});
  const sprite = new THREE_.Sprite(mat);
  sprite.scale.set(1.0, 1.0, 1.0);
  g.add(sprite);
  g._mat = mat;
  g._sprite = sprite;
  return g;
}

function undoEye(){
  if(chain.length === 0) return;

  const last = chain.pop();

  if(last.group) scene.remove(last.group);
  if(last.beam) scene.remove(last.beam);

  dragObj = null;
  updateChainInfo();

  document.getElementById('undoEye').disabled = chain.length === 0;

  flash(`Removed awareness ${chain.length + 1}.`);
}

function placeCamera(){
  camera.position.x = camDist * Math.cos(camPitch) * Math.sin(camYaw);
  camera.position.y = camDist * Math.sin(camPitch) + 0.5;
  camera.position.z = camDist * Math.cos(camPitch) * Math.cos(camYaw);
  camera.lookAt(0, 0.3, 0);
}

// ---- build one awareness-locus (an eye) ----
function makeEye(scale){
  const g = new THREE_.Group();
  const sclera = new THREE_.Mesh(new THREE_.SphereGeometry(0.42,28,22),
    new THREE_.MeshStandardMaterial({color:0xEDEFF6, roughness:0.35, emissive:0x222a3a, emissiveIntensity:0.3}));
  const iris = new THREE_.Mesh(new THREE_.SphereGeometry(0.2,24,18),
    new THREE_.MeshStandardMaterial({color:0xB8972B, emissive:0xB8972B, emissiveIntensity:0.7, roughness:0.4}));
  iris.position.z = 0.30;
  const pupil = new THREE_.Mesh(new THREE_.SphereGeometry(0.10,18,14),
    new THREE_.MeshStandardMaterial({color:0x0A1326}));
  pupil.position.z = 0.40;
  g.add(sclera); g.add(iris); g.add(pupil);
  g.scale.setScalar(scale);
  return {group:g, iris};
}

// ---- add the next I in the chain at a given world point ----
function addAwareness(worldPt){
  if(chain.length >= MAX_I) { flash("Eight awarenesses placed — the recursion is full."); return; }
  const depth = chain.length;                 // 0-based
  const scale = Math.max(0.55, 1 - depth*0.06); // each recedes slightly
  const eye = makeEye(scale);
  eye.group.position.copy(worldPt);
  scene.add(eye.group);

  // gaze beam: this I looks at its target (previous I, or the feeling for the first)
  const beam = new THREE_.Mesh(
    new THREE_.CylinderGeometry(0.012, 0.085, 1, 12, 1, true),
    new THREE_.MeshBasicMaterial({color:0xB8972B, transparent:true, opacity:0.30, side:THREE_.DoubleSide}));
  scene.add(beam);

  chain.push({group:eye.group, iris:eye.iris, beam});
  updateChainInfo();
  // gentle nudge so a fresh I doesn't perfectly overlap its target
  if(depth>0){
    eye.group.position.x += 0.6; eye.group.position.y += 0.55; eye.group.position.z -= 0.4;
  }
  
  document.getElementById('undoEye').disabled = false;
}

function targetOf(k){
  // what awareness k is looking at
  return (k===0) ? partMesh.position : chain[k-1].group.position;
}

function updateGazes(){
  chain.forEach((c,k)=>{
    const a = c.group.position, b = targetOf(k);
    const mid = a.clone().add(b).multiplyScalar(0.5);
    c.beam.position.copy(mid);
    const dir = b.clone().sub(a);
    const len = dir.length();
    c.beam.scale.set(1, Math.max(0.001,len), 1);
    if(len>0.001) c.beam.quaternion.setFromUnitVectors(new THREE_.Vector3(0,1,0), dir.clone().normalize());
    c.group.lookAt(b);
  });
}

function updateChainInfo(){
  document.getElementById('undoEye').disabled = chain.length === 0;
}

let t0 = performance.now();
function animate(){
  raf = requestAnimationFrame(animate);
  const t = (performance.now()-t0)/1000;

  if(partMesh.visible){ partMesh.rotation.y += 0.0015;
    partMesh.scale.setScalar(1 + Math.sin(t*1.5)*0.03); }

const open = 0;
fieldShell.scale.setScalar(0.6);
fieldShell.material.opacity = 0;
fieldShell.rotation.y += 0.0015;

  // the seated figure (billboard) sits within the activated feeling
  if(figure){
    figure.visible = partMesh.visible;
    figure.position.copy(partMesh.position);
    figure.position.y -= 0.02;
    if(figure._mat) figure._mat.opacity = partMesh.visible ? 1.0 : 0;
    const breath = 1 + Math.sin(t*0.8)*0.012;
    const s = 2.5;
    if(figure._sprite) figure._sprite.scale.set(s, s*breath, 1);
  }

  // as awareness opens, gazes fade and the chain softens into the field
  chain.forEach((c,k)=>{
    c.beam.material.opacity = 0.30*(1-open);
    c.iris.material.emissiveIntensity = 0.7*(1-open*0.7);
    const baseScale = Math.max(0.55, 1 - k*0.06);
    c.group.scale.setScalar(baseScale*(1 - open*0.35));
  });
  if(partMesh.visible){
    partMesh.material.emissiveIntensity = 0.5*(1-open*0.6);
  }

  updateGazes();
  renderer.render(scene, camera);
}


let hintT;
function flash(msg){
  const h = document.getElementById('hint');
  h.innerHTML = msg; h.classList.add('show');
  clearTimeout(hintT); hintT = setTimeout(()=>h.classList.remove('show'), 5200);
}

function reset(){
  started = false;
  awaitingPlacement = false;

  chain.forEach(c=>{
    scene.remove(c.group);
    scene.remove(c.beam);
  });

  chain = [];
  dragObj = null;

  partMesh.position.set(0,-0.4,0.2);
  partMesh.visible = false;

  document.getElementById('begin').disabled = false;
  document.getElementById('undoEye').disabled = true;

  updateChainInfo();

  flash("Ready for a new round.");
}

// ---- pointer: orbit, drag feeling/eyes, or drop the next I ----
function bindEvents(){
  const c = renderer.domElement;
  const ray = new THREE_.Raycaster();
  function ndc(e){ const r=c.getBoundingClientRect();
    return {x:((e.clientX-r.left)/r.width)*2-1, y:-((e.clientY-r.top)/r.height)*2+1}; }
  function dropPlane(){
    const pl=new THREE_.Plane();
    pl.setFromNormalAndCoplanarPoint(
      camera.getWorldDirection(new THREE_.Vector3()).negate(),
      new THREE_.Vector3(0,1,0));
    return pl;
  }
  function beginSession(){
  started = true;
  partMesh.visible = true;
  awaitingPlacement = true;

  document.getElementById('begin').disabled = true;

  flash("Begin. The image is now on the canvas. Click in the field to place awareness eyes.");
}
  function pickDraggable(e){
    const p = ndc(e); ray.setFromCamera(p, camera);
    const targets=[];
    if(partMesh.visible) targets.push(partMesh);
    chain.forEach(c=>targets.push(c.group.children[0]));
    const hit = ray.intersectObjects(targets, true);
    if(!hit.length) return null;
    // map hit back to a movable group
    let obj = hit[0].object;
    if(obj===partMesh) return partMesh;
    const found = chain.find(c=>c.group.children.includes(obj));
    return found ? found.group : null;
  }
  let dragObj=null, plane=new THREE_.Plane();
  c.addEventListener('pointerdown', e=>{
    c.setPointerCapture(e.pointerId);
    pointer.down=true; pointer.lx=e.clientX; pointer.ly=e.clientY;
    const h = pickDraggable(e);
    if(h){
      dragObj=h;
      plane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE_.Vector3()).negate(), dragObj.position);
    } else if(started && chain.length<MAX_I){
      const p=ndc(e); ray.setFromCamera(p,camera);
      const pt=new THREE_.Vector3();
      if(ray.ray.intersectPlane(dropPlane(), pt)){
        addAwareness(pt);
        const last = chain[chain.length-1].group;
        dragObj=last;
        plane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE_.Vector3()).negate(), dragObj.position);
        flash(`Awareness ${chain.length} placed. Click again to add another eye, or use Undo Eye.`);
      }
    } else dragObj=null;
  });
  c.addEventListener('pointermove', e=>{
    if(!pointer.down) return;
    if(dragObj){
      const p=ndc(e); ray.setFromCamera(p,camera);
      const pt=new THREE_.Vector3();
      if(ray.ray.intersectPlane(plane, pt)) dragObj.position.copy(pt);
    } else {
      camYaw -= (e.clientX-pointer.lx)*0.006;
      camPitch += (e.clientY-pointer.ly)*0.006;
      camPitch=Math.max(-0.9,Math.min(1.2,camPitch));
      placeCamera();
    }
    pointer.lx=e.clientX; pointer.ly=e.clientY;
  });
  c.addEventListener('pointerup', ()=>{ pointer.down=false; dragObj=null; });
  c.addEventListener('wheel', e=>{ e.preventDefault();
    camDist=Math.max(4,Math.min(18,camDist+e.deltaY*0.01)); placeCamera(); }, {passive:false});

 
  document.getElementById('begin').onclick = beginSession; 
  document.getElementById('undoEye').onclick = undoEye;
   document.getElementById('addnote').onclick = ()=>createNote();
  document.getElementById('reset').onclick = reset;
  document.getElementById('snap').onclick = capture;
  W.addEventListener('resize', ()=>{
    camera.aspect=W.innerWidth/W.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(W.innerWidth,W.innerHeight);
  });
}

// ---- notes boxes ----
let noteZ = 8;
function createNote(x, y, text){
  const stage = document.body;
  const el = document.createElement('div');
  el.className='note';
  el.style.left = (x ?? (W.innerWidth/2 - 95 + (Math.random()*40-20)))+'px';
  el.style.top  = (y ?? (W.innerHeight/2 - 60 + (Math.random()*40-20)))+'px';
  el.style.zIndex = ++noteZ;
  el.innerHTML = `
    <div class="nh"><span class="grip"></span><span class="nx" title="Remove">&times;</span></div>
    <textarea maxlength="250" placeholder="Up to 250 characters. Alt+Enter for a line break."></textarea>
    <div class="cc">0 / 250</div>`;
  stage.appendChild(el);

  const ta = el.querySelector('textarea');
  const cc = el.querySelector('.cc');
  if(text){ ta.value=text; }
  function count(){
    if(ta.value.length>250){ ta.value = ta.value.slice(0,250); }
    const n = ta.value.length;
    cc.textContent = n+' / 250';
    cc.classList.toggle('warn', n>=230);
  }
  count();
  ta.addEventListener('input', count);
  // Alt+Enter inserts a line break; plain Enter also allowed but Alt+Enter is the documented gesture
  ta.addEventListener('keydown', ev=>{
    if(ev.key==='Enter' && ev.altKey){
      ev.preventDefault();
      const s=ta.selectionStart, e=ta.selectionEnd;
      ta.value = ta.value.slice(0,s)+'\n'+ta.value.slice(e);
      ta.selectionStart=ta.selectionEnd=s+1;
      count();
    }
  });
  el.addEventListener('pointerdown', ev=>{ el.style.zIndex=++noteZ; }, true);
  el.querySelector('.nx').onclick = ()=>el.remove();

  // drag by header
  const hh = el.querySelector('.nh');
  let dx=0, dy=0, dragging=false;
  hh.addEventListener('pointerdown', ev=>{
    dragging=true; hh.setPointerCapture(ev.pointerId);
    dx = ev.clientX - el.offsetLeft; dy = ev.clientY - el.offsetTop;
    ev.stopPropagation();
  });
  hh.addEventListener('pointermove', ev=>{
    if(!dragging) return;
    el.style.left = Math.max(0, Math.min(W.innerWidth-60, ev.clientX-dx))+'px';
    el.style.top  = Math.max(0, Math.min(W.innerHeight-30, ev.clientY-dy))+'px';
  });
  hh.addEventListener('pointerup', ev=>{ dragging=false; });
  ta.focus();
  return el;
}

// ---- felt-shift rating + session log ----
function p3(v){ return Math.round(v*100)/100; }

// ---- PNG capture with legend + version ----
function capture(){
  renderer.render(scene,camera);
  const src=renderer.domElement;
  const out=document.createElement('canvas');
  out.width=src.width; out.height=src.height;
  const g=out.getContext('2d');
  g.drawImage(src,0,0);
  const pr=Math.min(W.devicePixelRatio,2);
  g.save(); g.scale(pr,pr);

  // --- burn notes at their on-screen positions ---
  const canvasRect = src.getBoundingClientRect();
  document.querySelectorAll('.note').forEach(note=>{
    const ta = note.querySelector('textarea');
    const text = (ta && ta.value.trim()) ? ta.value : '';
    const nx = note.offsetLeft - canvasRect.left;
    const ny = note.offsetTop  - canvasRect.top;
    const wpx = note.offsetWidth;
    // wrap text to the note width
    g.font='12px Georgia';
    const maxw = wpx-18;
    const lines=[];
    text.split('\n').forEach(para=>{
      let line='';
      para.split(' ').forEach(word=>{
        const test = line?line+' '+word:word;
        if(g.measureText(test).width>maxw && line){ lines.push(line); line=word; }
        else line=test;
      });
      lines.push(line);
    });
    const bh = 26 + lines.length*16;
    g.fillStyle='rgba(24,34,58,0.94)';
    g.fillRect(nx, ny, wpx, bh);
    g.strokeStyle='rgba(184,151,43,0.5)'; g.lineWidth=1; g.strokeRect(nx, ny, wpx, bh);
    g.fillStyle='#B8972B'; g.font='10px Georgia';
    g.fillText('NOTE', nx+9, ny+15);
    g.fillStyle='#E8ECF4'; g.font='12px Georgia';
    lines.forEach((ln,i)=> g.fillText(ln, nx+9, ny+30+i*16));
  });


out.toBlob(blob => {
  if (!blob) {
    flash("PNG capture failed.");
    return;
  }

  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);

  a.href = url;
  a.download = `wholeness-field-v${VERSION}-${Date.now()}.png`;
  document.body.appendChild(a);
  a.click();

  setTimeout(() => {
    URL.revokeObjectURL(url);
    a.remove();
  }, 1000);

  flash("PNG saved to your Downloads folder.");
}, 'image/png');
}
